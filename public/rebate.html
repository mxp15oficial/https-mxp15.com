<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mxp$15 - Rebate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #007bff; --text: #fff; --text-muted: #8b949e; --gold: #ffcc00; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; margin: 0; }
        
        .header-nav { display: flex; gap: 20px; font-size: 0.95em; border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-bottom: 15px; color: var(--text-muted); overflow-x: auto; white-space: nowrap; }
        .header-nav span { cursor: pointer; }
        .header-nav span.ativo { color: var(--accent); font-weight: bold; border-bottom: 2px solid var(--accent); padding-bottom: 8px; }

        .topo-info { background: var(--card); padding: 12px; border-radius: 8px; font-size: 0.85em; display: flex; justify-content: space-between; margin-bottom: 15px; border: 1px solid #30363d; }
        .topo-info span b { color: var(--gold); }

        .layout-principal { display: flex; gap: 10px; height: calc(100vh - 180px); }

        /* Menu Lateral Esquerdo */
        .menu-lateral { display: flex; flex-direction: column; gap: 8px; width: 90px; flex-shrink: 0; }
        .menu-btn { background: var(--card); border: 1px solid #30363d; color: var(--text); padding: 12px 5px; border-radius: 8px; text-align: center; font-size: 0.75em; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .menu-btn.destaque-receber { background: #21262d; border-color: var(--gold); color: var(--gold); }
        .menu-btn.destaque-historico { background: #21262d; color: var(--text-muted); }
        .menu-btn i { font-size: 1.2em; }

        /* Lista Deslizante de Provedores */
        .lista-provedores { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; }
        .lista-provedores::-webkit-scrollbar { width: 4px; }
        .lista-provedores::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }

        .card-provedor { background: var(--card); border: 1px solid #30363d; border-radius: 8px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        
        .card-linha-superior { display: flex; justify-content: space-between; align-items: center; font-size: 0.85em; }
        .provedor-nome { font-weight: bold; color: var(--text); display: flex; align-items: center; gap: 8px; }
        .provedor-detalhes { color: var(--text-muted); font-size: 0.75em; display: flex; gap: 15px; }
        .provedor-detalhes span b { color: var(--text); }

        .card-linha-inferior { display: flex; justify-content: space-between; align-items: center; font-size: 0.75em; color: var(--text-muted); border-top: 1px solid #21262d; padding-top: 6px; }
        .barra-progresso { flex-grow: 1; background: #21262d; height: 6px; border-radius: 3px; margin: 0 10px; overflow: hidden; position: relative; }
        .progresso-fill { background: var(--accent); height: 100%; width: 0%; }
        
        .valor-coletavel { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <!-- Navegação Superior -->
    <div class="header-nav">
        <span>Eventos</span>
        <span class="ativo">Rebate</span>
        <span>VIP</span>
        <span>Código de Resgate</span>
        <span>Histórico</span>
    </div>

    <!-- Info de Coleta -->
    <div class="topo-info">
        <span>Pode ser coletado hoje: <b id="total-coletavel">R$ 0,00</b></span>
        <span>Disponível para coleta amanhã: <b id="total-amanha">R$ 0,00</b></span>
    </div>

    <div class="layout-principal">
        <!-- Menu Lateral Esquerdo -->
        <div class="menu-lateral">
            <div class="menu-btn"><i class="fa-solid fa-clone"></i> Cartas</div>
            <div class="menu-btn"><i class="fa-solid fa-dice"></i> Slot</div>
            <div class="menu-btn"><i class="fa-solid fa-fish"></i> Pesca</div>
            <div class="menu-btn destaque-receber" onclick="tentarColetar()"><i class="fa-solid fa-hand-holding-dollar"></i> Receber</div>
            <div class="menu-btn destaque-historico"><i class="fa-solid fa-clock-rotate-left"></i> Histórico</div>
        </div>

        <!-- Lista de Provedores com Rolagem (Scroll) -->
        <div class="lista-provedores" id="container-provedores">
            <!-- Inserido dinamicamente -->
        </div>
    </div>

    <script>
        // Provedores atualizados idênticos ao layout solicitado
        let dadosRebate = [
            { id: 'pg', nome: 'PG Aposta', gasto: 0.00, taxa: 10.00 },
            { id: 'tada', nome: 'TaDa Aposta', gasto: 0.00, taxa: 10.00 },
            { id: 'c9', nome: 'C9 GAMING Aposta', gasto: 0.00, taxa: 10.00 },
            { id: 'jdb', nome: 'JDB Aposta', gasto: 0.00, taxa: 10.00 },
            { id: 'spribe', nome: 'SPRIBE Aposta', gasto: 0.00, taxa: 10.00 },
            { id: 'play', nome: 'PP Aposta', gasto: 0.00, taxa: 10.00 },
            { id: 'fc', nome: 'FC Aposta', gasto: 0.00, taxa: 10.00 },
            { id: 'gako', nome: 'GAKO Aposta', gasto: 0.00, taxa: 10.00 },
            { id: 'jc', nome: 'JC Aposta', gasto: 0.00, taxa: 10.00 }
        ];

        let salvos = JSON.parse(localStorage.getItem('mxp15_rebate_dados')) || {};
        dadosRebate.forEach(item => {
            if(salvos[item.id] !== undefined) {
                item.gasto = salvos[item.id];
            }
        });

        function renderizarRebate() {
            const container = document.getElementById('container-provedores');
            container.innerHTML = '';
            
            let totalColetavelGeral = 0;

            dadosRebate.forEach(item => {
                // Cálculo de 10% de rebate sobre o gasto
                let valorRebate = item.gasto * (item.taxa / 100);
                totalColetavelGeral += valorRebate;

                container.innerHTML += `
                    <div class="card-provedor">
                        <div class="card-linha-superior">
                            <span class="provedor-nome">${item.nome}</span>
                            <div class="provedor-detalhes">
                                <span>R$ <b>${item.gasto.toFixed(2)}</b> Gasto</span>
                                <span>Taxa de reembolso: <b>${item.taxa.toFixed(2)}%</b></span>
                            </div>
                        </div>
                        <div class="card-linha-inferior">
                            <span>Aposte para receber</span>
                            <div class="barra-progresso">
                                <div class="progresso-fill" style="width: ${Math.min((item.gasto / 100) * 100, 100)}%;"></div>
                            </div>
                            <span>Coletável: <span class="valor-coletavel">R$ ${valorRebate.toFixed(2)}</span></span>
                        </div>
                    </div>
                `;
            });

            document.getElementById('total-coletavel').innerText = `R$ ${totalColetavelGeral.toFixed(2)}`;
        }

        // Função para simular quando o usuário gasta saldo jogando nos provedores
        function simularGastoJogo(idProvedor, valorGasto) {
            let item = dadosRebate.find(p => p.id === idProvedor);
            if(item) {
                item.gasto += valorGasto;
                let objSalvar = {};
                dadosRebate.forEach(p => objSalvar[p.id] = p.gasto);
                localStorage.setItem('mxp15_rebate_dados', JSON.stringify(objSalvar));
                renderizarRebate();
            }
        }

        // Validação estrita: Só permite coletar se houver saldo disponível para resgate
        function tentarColetar() {
            let totalColetavelGeral = 0;
            dadosRebate.forEach(item => {
                totalColetavelGeral += item.gasto * (item.taxa / 100);
            });

            if (totalColetavelGeral <= 0) {
                alert("Você não possui saldo disponível para coleta no momento.");
                return;
            }

            // Se houver saldo, efetiva a coleta
            alert(`Sucesso! R$ ${totalColetavelGeral.toFixed(2)} coletados para a carteira da mxp$15.`);
            
            dadosRebate.forEach(p => p.gasto = 0);
            let objSalvar = {};
            dadosRebate.forEach(p => objSalvar[p.id] = p.gasto);
            localStorage.setItem('mxp15_rebate_dados', JSON.stringify(objSalvar));
            renderizarRebate();
        }

        window.onload = function() {
            renderizarRebate();
        };
    </script>
</body>
</html>
