<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promoção - Rebate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0b0e14; --card-bg: #161b22; --accent-gold: #d4af37; --btn-green: #00c853; --btn-grey: #262d3a; --text-main: #ffffff; --text-muted: #8b949e; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; margin: 0; padding-bottom: 90px; }

        /* Menu de Abas Superior */
        .tabs { display: flex; overflow-x: auto; background: #1c2431; padding: 10px; border-bottom: 1px solid #30363d; white-space: nowrap; }
        .tab { padding: 10px 15px; color: var(--text-muted); cursor: pointer; font-size: 0.9em; }
        .tab.active { color: var(--accent-gold); border-bottom: 2px solid var(--accent-gold); }

        .rebate-header { padding: 20px; text-align: center; }
        .rebate-total { color: var(--accent-gold); font-size: 1.5em; font-weight: bold; }

        .btn-action { padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; margin: 5px; }
        .btn-receber { background: var(--btn-grey); color: #888; cursor: not-allowed; }
        .btn-receber.ativo { background: var(--btn-green); color: #000; cursor: pointer; }
        .btn-historico { background: var(--btn-grey); color: #fff; }

        .navbar { position: fixed; bottom: 0; width: 100%; background: #0b0e14; border-top: 1px solid #30363d; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { color: var(--text-muted); font-size: 0.75em; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--accent-gold); }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab" onclick="location.href='eventos.html'">Eventos</div>
        <div class="tab active" onclick="location.href='rebate.html'">Rebate</div>
        <div class="tab" onclick="location.href='vip.html'">VIP</div>
        <div class="tab" onclick="location.href='codigo.html'">Código</div>
        <div class="tab" onclick="location.href='historico.html'">Histórico</div>
        <div class="tab" onclick="location.href='pendente.html'">Pendente</div>
    </div>

    <div class="rebate-header">
        <div>Pode ser coletado hoje</div>
        <div class="rebate-total" id="saldo-rebate">R$ 00,00</div>
        
        <button id="btn-receber" class="btn-action btn-receber" onclick="coletarRebate()">Receber</button>
        <button class="btn-action btn-historico" onclick="location.href='historico.html'">Ver Histórico</button>
    </div>

    <nav class="navbar">
        <div class="nav-item" onclick="location.href='index.html'"><i class="fa-solid fa-house" style="display:block; font-size: 1.4em; margin-bottom: 4px;"></i>Inicio</div>
        <div class="nav-item active" onclick="location.href='promocao.html'"><i class="fa-solid fa-gift" style="display:block; font-size: 1.4em; margin-bottom: 4px;"></i>Promoção</div>
        <div class="nav-item" onclick="location.href='deposito.html'"><i class="fa-solid fa-wallet" style="display:block; font-size: 1.4em; margin-bottom: 4px;"></i>Depósito</div>
        <div class="nav-item" onclick="location.href='saque.html'"><i class="fa-solid fa-arrow-right-arrow-left" style="display:block; font-size: 1.4em; margin-bottom: 4px;"></i>Saque</div>
        <div class="nav-item" onclick="location.href='perfil.html'"><i class="fa-solid fa-user" style="display:block; font-size: 1.4em; margin-bottom: 4px;"></i>Perfil</div>
    </nav>

    <script>
        function coletarRebate() {
            const btn = document.getElementById('btn-receber');
            if (btn.classList.contains('ativo')) {
                alert("Rebate coletado!");
                document.getElementById('saldo-rebate').textContent = "R$ 00,00";
                btn.classList.remove('ativo');
                btn.classList.add('btn-receber');
            }
        }
    </script>
</body>
</html>
