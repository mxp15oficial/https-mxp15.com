<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Código de Resgate - MXP$15</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0a1424;
    color:#fff;
}

.container{
    max-width:400px;
    margin:50px auto;
    padding:20px;
}

.card{
    background:#12203d;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

h2{
    color:#ffcc00;
}

input{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#ffcc00;
    color:#000;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#ffd633;
}

#resultado{
    margin-top:20px;
    font-weight:bold;
    color:#00ff66;
}
</style>

</head>

<body>

<div class="container">
    <div class="card">

        <h2>🎁 Código de Resgate</h2>

        <input
            type="text"
            id="codigo"
            placeholder="Digite seu código">

        <button onclick="resgatar()">
            Resgatar
        </button>

        <p id="resultado"></p>

    </div>
</div>

<script>

const codigos = {
    "MXP100":"R$100",
    "BEMVINDO":"R$20",
    "VIP2026":"R$500",
    "BONUS777":"R$777"
};

function resgatar(){

    const codigo =
    document.getElementById("codigo")
    .value
    .trim()
    .toUpperCase();

    if(codigos[codigo]){

        document.getElementById("resultado").innerHTML =
        "✅ Código válido! Você ganhou " + codigos[codigo];

    }else{

        document.getElementById("resultado").innerHTML =
        "❌ Código inválido.";

    }

}

</script>

</body>
</html>
