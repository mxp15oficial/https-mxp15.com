<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MXP$15</title>

    <!-- Padronizado com o cadastro -->
    <link rel="stylesheet" href="estilos.css">
    
    <!-- Biblioteca do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Seu arquivo de conexão (certifique-se de que esteja na mesma pasta) -->
    <script src="supabase.js"></script>
</head>

<body>

    <div class="login-box">

        <img src="4085.jpg" width="150" alt="Logo MXP$15">

        <h1>LOGIN MXP$15</h1>

        <!-- Formulário para capturar o evento de submit e permitir o Enter -->
        <form id="formLogin">
            <input type="email" id="email" placeholder="E-mail" required>
            <br><br>
            <input type="password" id="senha" placeholder="Senha" required>
            <br><br>
            <button type="submit">ENTRAR</button>
        </form>

        <br>

        <button type="button" onclick="window.location.href='cadastro.html'">
            CRIAR CONTA
        </button>

    </div>

    <script>
        // Captura o evento de envio do formulário
        document.getElementById("formLogin").addEventListener("submit", async function(e) {
            e.preventDefault(); // Impede o recarregamento da página

            const email = document.getElementById("email").value.trim();
            const senha = document.getElementById("senha").value;

            try {
                // Validação direta no Supabase
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: senha
                });

                if (error) {
                    alert("Erro ao entrar: " + error.message);
                    return;
                }

                // Sucesso
                alert("Login realizado com sucesso!");
                window.location.href = "home.html"; // Redireciona para a home

            } catch (err) {
                alert("Erro inesperado: " + err.message);
                console.error(err);
            }
        });
    </script>

</body>
</html>
