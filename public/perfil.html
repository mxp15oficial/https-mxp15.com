<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Casino Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0b0e14; --card-bg: #161b22; --accent-gold: #d4af37; --btn-green: #00c853; --text-main: #ffffff; --text-muted: #8b949e; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; margin: 0; padding-bottom: 90px; }

        /* Header e Botões */
        .header-profile { padding: 25px 20px; display: flex; align-items: center; gap: 15px; background: linear-gradient(180deg, #1c2431 0%, #0b0e14 100%); }
        .avatar { width: 70px; height: 70px; border-radius: 15px; border: 2px solid var(--accent-gold); object-fit: cover; }
        .btn-container { display: flex; gap: 15px; padding: 0 20px; margin-top: -15px; margin-bottom: 20px; }
        .btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }
        .btn-saque { background: #262d3a; color: white; }
        .btn-deposito { background: var(--btn-green); color: #000; }

        /* Card VIP Estilizado como na foto */
        .vip-card { background: var(--card-bg); margin: 0 20px 20px 20px; padding: 20px; border-radius: 16px; border: 1px solid #30363d; position: relative; }
        .vip-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .vip-badge { color: var(--accent-gold); font-weight: bold; font-size: 1.1em; }
        .progress-container { height: 10px; background: #0b0e14; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #d4af37, #f1c40f); width: 36.15%; }
        .vip-text { font-size: 0.85em; color: var(--text-muted); display: flex; justify-content: space-between; }

        /* Menu */
        .menu-list { margin: 0 20px 20px 20px; display: flex; flex-direction: column; gap: 10px; }
        .menu-item { background: var(--card-bg); padding: 16px; border-radius: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid #30363d; cursor: pointer; }
        .menu-item i { color: var(--accent-gold); width: 20px; text-align: center; }

        /* Navbar */
        .navbar { position: fixed; bottom: 0; width: 100%; background: #0b0e14; border-top: 1px solid #30363d; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { color: var(--text-muted); font-size: 0.75em; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--accent-gold); }
    </style>
</head>
<body>

    <div class="header-profile">
        <img src="https://i.pravatar.cc/150?u=1" class="avatar" alt="Avatar">
        <div>
            <div style="font-size: 0.9em; color: var(--text-muted);">ID: 1000535545</div>
            <div style="font-size: 1.8em; font-weight: 700;">R$ 0,56</div>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn btn-saque">Saque</button>
        <button class="btn btn-deposito">Depósito</button>
    </div>

    <div class="vip-card">
        <div class="vip-header">
            <i class="fa-solid fa-crown" style="color: var(--accent-gold);"></i>
            <span class="vip-badge">V3</span>
            <span style="font-size: 0.9em;">Siga <strong>VIP4</strong> | Ainda precisa apostar 6.384,05</span>
            <i class="fa-solid fa-chevron-right" style="margin-left: auto; font-size: 0.8em; color: #555;"></i>
        </div>
        <div class="progress-container"><div class="progress-bar"></div></div>
        <div class="vip-text"><span>Aposta necessária</span> <span>3.615,95/10.000,00</span></div>
    </div>

    <div class="menu-list">
        <div class="menu-item"><i class="fa-solid fa-file-invoice"></i> Relatórios <i class="fa-solid fa-chevron-right" style="margin-left: auto; font-size: 0.8em; color: #555;"></i></div>
        <div class="menu-item"><i class="fa-solid fa-user-plus"></i> Convidar <span style="margin-left: auto; font-size: 0.8em; color: var(--accent-gold);">Ganhe R$50</span></div>
        <div class="menu-item"><i class="fa-solid fa-gift"></i> Código de Resgate <i class="fa-solid fa-chevron-right" style="margin-left: auto; font-size: 0.8em; color: #555;"></i></div>
        <div class="menu-item"><i class="fa-solid fa-headset"></i> Suporte <span style="background: #ff3d3d; color: white; font-size: 0.7em; padding: 2px 8px; border-radius: 10px; margin-left: auto;">79</span></div>
        <div class="menu-item"><i class="fa-solid fa-shield-halved"></i> Centro de Segurança <i class="fa-solid fa-chevron-right" style="margin-left: auto; font-size: 0.8em; color: #555;"></i></div>
        <div class="menu-item"><i class="fa-solud fa-shield-halved"></i> sair da conta <i class=
    </div>

    <nav class="navbar">
        <div class="nav-item" onclick="location.href='index.html'"><i class="fa-solid fa-house" style="display:block; font-size: 1.4em; margin-bottom: 4px;"></i>Inicio</div>
        <div class="nav-item" onclick="location.href='promocao.html'"><i class="fa-solid fa-gift" style="display:block; font-size: 1.4em; margin-bottom: 4px;"></i>Promoção</div>
        <div class="nav-item" onclick="location.href='deposito.html'"><i class="fa-solid fa-wallet" style="display:block; font-size: 1.4em; margin-bottom: 4px;"></i>Depósito</div>
        <div class="nav-item" onclick="location.href='saque.html'"><i class="fa-solid fa-arrow-right-arrow-left" style="display:block; font-size: 1.4em; margin-bottom: 4px;"></i>Saque</div>
        <div class="nav-item active" onclick="location.href='perfil.html'"><i class="fa-solid fa-user" style="display:block; font-size: 1.4em; margin-bottom: 4px;"></i>Perfil</div>
    </nav>
</body>
</html>
