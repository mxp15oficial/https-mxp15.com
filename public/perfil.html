<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Casino Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0b0e14; --card-bg: #161b22; --accent-gold: #d4af37; --text-main: #ffffff; --text-muted: #8b949e; --btn-green: #00c853; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; margin: 0; padding-bottom: 100px; }

        /* Header Perfil */
        .profile-header { padding: 20px; display: flex; align-items: center; gap: 15px; }
        .profile-img { width: 60px; height: 60px; border-radius: 12px; background: #30363d; }
        .profile-info h3 { margin: 0; font-size: 1.1em; }
        .profile-info p { margin: 5px 0 0; color: var(--accent-gold); font-size: 1.2em; font-weight: bold; }

        /* Ações Rápidas */
        .action-btns { display: flex; gap: 10px; padding: 0 20px 20px; }
        .btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-saque { background: #1c2431; color: #fff; }
        .btn-deposito { background: var(--btn-green); color: #000; }

        /* Menu de Opções */
        .menu-list { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
        .menu-item { background: var(--card-bg); padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; color: var(--text-main); text-decoration: none; }

        /* Navbar Corrigida */
        .navbar { position: fixed; bottom: 0; width: 100%; background: #0b0e14; border-top: 1px solid #30363d; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { color: var(--text-muted); font-size: 0.75em; text-align: center; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: var(--accent-gold); }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="profile-img"></div>
        <div class="profile-info">
            <h3>ID: 1000535545</h3>
            <p>R$ 0,00</p>
        </div>
    </div>

    <div class="action-btns">
        <button class="btn btn-saque">Saque</button>
        <button class="btn btn-deposito">Depósito</button>
    </div>

    <div class="menu-list">
        <div class="menu-item">VIP 0 <span>></span></div>
        <a href="#" class="menu-item">Relatórios <span>></span></a>
        <a href="#" class="menu-item">Convidar <span>></span></a>
        <a href="#" class="menu-item">Código de Resgate <span>></span></a>
        <a href="#" class="menu-item">Suporte <span>></span></a>
        <a href="#" class="menu-item">Centro de Segurança <span>></span></a>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-house" style="display:block; font-size: 1.4em;"></i>Inicio</a>
        <!-- LINK CORRIGIDO ABAIXO: Certifique-se que o nome 'promocao.html' corresponde ao seu arquivo -->
        <a href="promocao.html" class="nav-item"><i class="fa-solid fa-gift" style="display:block; font-size: 1.4em;"></i>Promoção</a>
        <a href="deposito.html" class="nav-item"><i class="fa-solid fa-wallet" style="display:block; font-size: 1.4em;"></i>Depósito</a>
        <a href="saque.html" class="nav-item"><i class="fa-solid fa-arrow-right-arrow-left" style="display:block; font-size: 1.4em;"></i>Saque</a>
        <a href="perfil.html" class="nav-item active"><i class="fa-solid fa-user" style="display:block; font-size: 1.4em;"></i>Perfil</a>
    </nav>
</body>
</html>
