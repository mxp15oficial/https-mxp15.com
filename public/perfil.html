<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #0d0d0d; color: #fff; margin: 0; padding: 20px; }
        .profile-container { max-width: 600px; margin: auto; background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; }
        .header { text-align: center; border-bottom: 2px solid #e74c3c; padding-bottom: 15px; }
        .stats { display: flex; justify-content: space-around; margin-top: 20px; }
        .stat-box { background: #262626; padding: 15px; border-radius: 10px; text-align: center; width: 30%; }
        .balance { font-size: 24px; color: #f1c40f; font-weight: bold; margin-top: 10px; }
        .btn-deposit { display: block; width: 100%; padding: 15px; background: #e74c3c; color: white; text-align: center; border: none; border-radius: 5px; margin-top: 20px; font-weight: bold; cursor: pointer; text-decoration: none; }
        .btn-deposit:hover { background: #c0392b; }
    </style>
</head>
<body>

<div class="profile-container">
    <div class="header">
        <h2>Seu Perfil</h2>
        <p>Bem-vindo, Jogador!</p>
    </div>

    <div class="stats">
        <div class="stat-box">Nível<br><strong>VIP 2</strong></div>
        <div class="stat-box">Jogos<br><strong>42</strong></div>
        <div class="stat-box">Vitórias<br><strong>18</strong></div>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <p>Saldo Atual:</p>
        <div class="balance">R$ 1.250,00</div>
    </div>

    <a href="#" class="btn-deposit">DEPOSITAR AGORA</a>
</div>

</body>
</html>
