<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Casino Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #161b22;
            --accent-gold: #d4af37;
            --btn-green: #00c853;
            --text-main: #ffffff;
            --text-muted: #8b949e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding-bottom: 80px;
        }

        /* Perfil Header */
        .header-profile { padding: 25px 20px; display: flex; align-items: center; gap: 15px; background: linear-gradient(180deg, #1c2431 0%, #0b0e14 100%); }
        .avatar { width: 70px; height: 70px; border-radius: 15px; border: 2px solid var(--accent-gold); object-fit: cover; }
        .user-id { font-size: 0.9em; color: var(--text-muted); }
        .user-balance { font-size: 1.8em; font-weight: 700; color: var(--text-main); margin-top: 5px; }

        /* Botões Ação */
        .btn-container { display: flex; gap: 15px; padding: 0 20px; margin-top: -15px; }
        .btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-saque { background: #262d3a; color: white; }
        .btn-deposito { background: var(--btn-green); color: #000; box-shadow: 0 4px 15px rgba(0, 200, 83, 0.3); }

        /* VIP Section */
        .vip-section { background: var(--card-bg); margin: 25px 20px; padding: 20px; border-radius: 16px; border: 1px solid #30363d; }
        .progress-bar { height: 8px; background: #0b0e14; border-radius: 4px; margin: 12px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #d4af37, #f1c40f); width: 36%; }

        /* Lista de Links */
        .menu-list { margin: 20px; display: flex; flex-direction: column; gap: 12px; }
        .menu-item { background: var(--card-bg); padding: 18px; border-radius: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; border: 1px solid #30363d; }
        .menu-item i { color: var(--accent-gold); width: 20px; }
        .badge { background: #ff3d3d; color: white; font-size: 0.75em; padding: 2px 8px; border-radius: 10px; margin-left: auto; }

        /* Menu Inferior */
        .navbar { position: fixed; bottom: 0; width: 100%; background: #0b0e14; border-top: 1px solid #30363d; display: flex; justify-content: space-around; padding: 15px 0; }
        .nav-item { color: var(--text-muted); font-size: 0.8em; text-align: center; }
        .nav-item.active { color: var(--accent-gold); }
    </style>
</head>
<body>

    <div class="header-profile">
        <img src="https://i.pravatar.cc/150?u=1" class="avatar" alt="Avatar">
        <div>
            <div class="user-id">ID: 1000535545 <i class="fa-regular fa-copy"></i></div>
            <div class="user-balance">R$ 0,56 <i class="fa-solid fa-rotate-right" style="font-size: 0.6em; color: var(--text-muted);"></i></div>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn btn-saque">Saque</button>
        <button class="btn btn-deposito">Depósito</button>
    </div>

    <div class="vip-section">
        <div style="display: flex; justify-content: space-between;">
            <strong>Nível VIP 3</strong>
            <span style="color: var(--accent-gold);">Siga VIP 4</span>
        </div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <div style="font-size: 0.8em; color: var(--text-muted);">Ainda precisa apostar: 6.384,05</div>
    </div>

    <div class="menu-list">
        <div class="menu-item"><i class="fa-solid fa-file-invoice"></i> Relatórios <i class="fa-solid fa-chevron-right" style="margin-left: auto;"></i></div>
        <div class="menu-item"><i class="fa-solid fa-user-plus"></i> Convidar <span style="margin-left: auto; color: var(--accent-gold);">Ganhe R$50</span></div>
        <div class="menu-item"><i class="fa-solid fa-ticket"></i> Código de Resgate <i class="fa-solid fa-chevron-right" style="margin-left: auto;"></i></div>
        <div class="menu-item"><i class="fa-solid fa-headset"></i> Suporte <span class="badge">79</span></div>
    </div>

    <nav class="navbar">
        <div class="nav-item"><i class="fa-solid fa-house"></i><br>Inicio</div>
        <div class="nav-item"><i class="fa-solid fa-gift"></i><br>Promoção</div>
        <div class="nav-item"><i class="fa-solid fa-wallet"></i><br>Depósito</div>
        <div class="nav-item"><i class="fa-solid fa-arrow-right-arrow-left"></i><br>Saque</div>
        <div class="nav-item active"><i class="fa-solid fa-user"></i><br>Perfil</div>
    </nav>

</body>
</html>
