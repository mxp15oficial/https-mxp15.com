<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convide e Ganhe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0b0e14; --accent-gold: #d4af37; --text-main: #ffffff; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; text-align: center; padding: 20px; }
        
        .header { text-align: left; font-weight: bold; font-size: 1.2em; margin-bottom: 20px; }
        
        /* Baú */
        #bau-container { margin: 40px auto; cursor: pointer; }
        #bau-img { width: 150px; transition: transform 0.3s; }
        
        .stats { font-size: 1.2em; margin-bottom: 20px; }
        .highlight { color: var(--accent-gold); font-weight: bold; }
        
        .btn-share { background: var(--accent-gold); color: #000; padding: 15px 40px; border-radius: 25px; font-weight: bold; cursor: pointer; border: none; font-size: 1em; }
    </style>
</head>
<body>

    <div class="header"><i class="fa-solid fa-chevron-left" onclick="history.back()"></i> Convite</div>

    <div class="stats">
        Amigos convidados: <span id="contagem" class="highlight">0</span>/1
    </div>

    <div id="bau-container" onclick="reivindicarBau()">
        <img id="bau-img" src="treasureBoxClose.png" alt="Baú">
    </div>

    <p id="mensagem">Convide 1 amigo para abrir o baú!</p>

    <button class="btn-share" onclick="compartilhar()">Divulgar Link</button>

    <script>
        // Dados do Usuário (Sincronizado com seu servidor)
        let convites = 0; // Exemplo: mude para 1 para ver o baú abrir
        const meta = 1;

        function carregarPagina() {
            const bauImg = document.getElementById('bau-img');
            const contagemTxt = document.getElementById('contagem');
            const msgTxt = document.getElementById('mensagem');

            contagemTxt.innerText = convites;

            if (convites >= meta) {
                bauImg.src = "treasureBoxOpen.png";
                msgTxt.innerText = "Parabéns! Baú disponível para abertura!";
            } else {
                bauImg.src = "treasureBoxClose.png";
            }
        }

        function reivindicarBau() {
            if (convites >= meta) {
                alert("Você ganhou R$ 30,00!");
                // Aqui você chamaria a API para adicionar o saldo ao usuário
            } else {
                alert("Você ainda não atingiu a meta de 1 convite.");
            }
        }

        function compartilhar() {
            const link = "https://seucassino.com/cadastro?ref=ID_DO_USUARIO";
            navigator.clipboard.writeText(link);
            alert("Link copiado! Divulgue para seus amigos.");
        }

        window.onload = carregarPagina;
    </script>
</body>
</html>
