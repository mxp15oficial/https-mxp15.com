<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite</title>

    <!-- CORRIGIDO: Vinculado ao seu arquivo real estilos.css -->
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <div class="login-box">

        <img src="4085.jpg" width="120" alt="Logo">

        <h1>Sistema de Convite</h1>

        <p>Seu código:</p>

        <!-- Adicionado ID para o JavaScript conseguir identificar o texto -->
        <h2 id="codigoVip">MXP15VIP</h2>

        <br>

        <!-- ADICIONADO: Função para copiar o código automaticamente -->
        <button onclick="copiarCodigo()">
            Copiar Código
        </button>

        <br><br>

        <!-- ADICIONADO: Função para compartilhar o link do site -->
        <button onclick="compartilharLink()">
            Compartilhar Link
        </button>

        <br><br>

        <!-- CORRIGIDO: Redireciona para o arquivo correto página inicial.html -->
        <button onclick="window.location.href='página inicial.html'">
            Voltar
        </button>

    </div>

    <script>
    function copiarCodigo() {
        const codigo = document.getElementById("codigoVip").innerText;
        
        navigator.clipboard.writeText(codigo).then(() => {
            alert("Código de convite copiado com sucesso!");
        }).catch(err => {
            alert("Erro ao copiar o código automaticamente.");
        });
    }

    function compartilharLink() {
        const linkSuporte = window.location.origin + "/cadastro.html?ref=MXP15VIP";

        if (navigator.share) {
            navigator.share({
                title: 'Venha para o MXP$15',
                text: 'Cadastre-se usando meu código VIP: MXP15VIP',
                url: linkSuporte,
            }).catch(console.error);
        } else {
            navigator.clipboard.writeText(linkSuporte).then(() => {
                alert("Link de indicação copiado para a área de transferência!");
            });
        }
    }
    </script>

</body>

</html>
