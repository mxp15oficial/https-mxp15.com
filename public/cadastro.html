<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - MXP$15</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-box">
    <img src="4085.jpg" width="150" alt="Logo">
    <h1>CRIAR CONTA</h1>
    <!-- O id abaixo deve ser exatamente este -->
    <form id="formCadastro">
        <input type="text" id="usuario" placeholder="Usuário" required>
        <br><br>
        <input type="email" id="email" placeholder="E-mail" required>
        <br><br>
        <input type="password" id="senha" placeholder="Senha" minlength="6" required>
        <br><br>
        <button type="submit">CADASTRAR</button>
    </form>
    <br><br>
    <button type="button" onclick="window.location.href='login.html'">VOLTAR LOGIN</button>
</div>

<!-- Biblioteca do Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const supabaseUrl = 'https://guavczqfnqkshhgpyccs.supabase.co';
    const supabaseKey = 'sb_publishable_1qUbWglTgDfCV4MIDT7qWQ_jetIG_ht';
    
    // Verifica se o Supabase carregou
    if (typeof supabase === 'undefined') {
        alert("Erro: A biblioteca do Supabase não carregou. Verifique sua internet.");
    } else {
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById("formCadastro").addEventListener("submit", async function(e){
            e.preventDefault();
            
            const nome = document.getElementById("usuario").value.trim();
            const email = document.getElementById("email").value.trim();
            const senha = document.getElementById("senha").value;

            try {
                const { data, error } = await supabase.auth.signUp({ 
                    email: email, 
                    password: senha 
                });

                if (error) throw error;

                // Se chegou aqui, o usuário foi criado
                alert("Sucesso! Cadastro realizado.");
                window.location.href = "login.html";
                
            } catch(err) {
                alert("Erro no cadastro: " + err.message);
            }
        });
    }
</script>

</body>
</html>
