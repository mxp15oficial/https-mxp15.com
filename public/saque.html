<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saque - Casino Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0b0e14; --accent-blue: #007bff; --text-muted: #8b949e; --accent-gold: #d4af37; }
        body { background-color: var(--bg-color); color: #ffffff; font-family: sans-serif; margin: 0; padding: 0 20px; padding-bottom: 40px; }

        .header { padding: 20px 0; display: flex; align-items: center; font-weight: bold; font-size: 1.2em; }
        
        .saldo-container { background: #161b22; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #30363d; text-align: center; }
        .saldo-label { color: var(--text-muted); font-size: 0.85em; margin-bottom: 5px; }
        .saldo-valor { color: #28a745; font-size: 1.8em; font-weight: bold; }
        
        .grid-values { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .value-btn { padding: 15px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; text-align: center; cursor: pointer; color: #fff; transition: 0.3s; font-weight: bold; }
        .value-btn.selected { border: 1px solid var(--accent-blue); background: #1c2431; color: var(--accent-blue); }

        .input-group { margin-bottom: 15px; }
        .label-text { color: var(--text-muted); font-size: 0.9em; margin-bottom: 5px; display: block; }
        .input-field { width: 100%; padding: 15px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; color: white; box-sizing: border-box; outline: none; font-size: 1.1em; }
        
        .btn-withdraw { width: 100%; padding: 18px; background: var(--accent-blue); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1em; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-chevron-left" style="cursor:pointer;" onclick="history.back()"></i> 
        <span style="margin: 0 auto;">Saque</span>
    </div>

    <div class="saldo-container">
        <div class="saldo-label">Saldo Disponível na Plataforma</div>
        <div class="saldo-valor" id="display-saldo">R$ 0,00</div>
    </div>

    <!-- Botões de atalho circulados -->
    <div class="grid-values">
        <div class="value-btn" onclick="atualizarInput(10, this)">10,00</div>
        <div class="value-btn" onclick="atualizarInput(50, this)">50,00</div>
        <div class="value-btn" onclick="atualizarInput(100, this)">100,00</div>
        <div class="value-btn" onclick="atualizarInput(500, this)">500,00</div>
        <div class="value-btn" onclick="atualizarInput(1000, this)">1.000,00</div>
        <div class="value-btn" onclick="atualizarInput(15000, this)">15.000,00</div>
    </div>

    <div class="input-group">
        <span class="label-text">Valor do saque</span>
        <input type="number" id="valor-saque" class="input-field" placeholder="0,00">
    </div>

    <div class="input-group">
        <span class="label-text">Nome do Beneficiário</span>
        <input type="text" id="nome-usuario" class="input-field" placeholder="Digite seu nome completo">
    </div>

    <div class="input-group">
        <span class="label-text">Chave PIX (CPF, E-mail ou Telefone)</span>
        <input type="text" id="chave-pix" class="input-field" placeholder="Digite sua chave PIX">
    </div>

    <button class="btn-withdraw" onclick="realizarSaque()">Retirar Agora</button>

    <script>
        // Pega o saldo real salvo no navegador (o mesmo que alimenta a home e o perfil)
        let saldoAtualUsuario = parseFloat(localStorage.getItem('mxp_saldo')) || 0;

        window.onload = function() {
            // Exibe o saldo formatado na tela
            document.getElementById('display-saldo').innerText = 'R$ ' + saldoAtualUsuario.toLocaleString('pt-BR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        };

        // Função para os botões rápidos preencherem o input
        function atualizarInput(valor, btnElemento) {
            const campoInput = document.getElementById('valor-saque');
            campoInput.value = valor;

            // Efeito visual de seleção nos botões
            document.querySelectorAll('.value-btn').forEach(b => b.classList.remove('selected'));
            btnElemento.classList.add('selected');
        }

        // Função de validação e disparo do saque (Simulando a análise do Gateway/Plataforma)
        function realizarSaque() {
            let valorSaque = parseFloat(document.getElementById('valor-saque').value);
            let nome = document.getElementById('nome-usuario').value.trim();
            let pix = document.getElementById('chave-pix').value.trim();
            
            // 1. Valida se preencheu tudo
            if (isNaN(valorSaque) || valorSaque <= 0) {
                alert("Por favor, digite ou selecione um valor válido para saque.");
                return;
            }
            if (!nome || !pix) {
                alert("Preencha o nome do beneficiário e a chave Pix.");
                return;
            }

            // 2. VALIDAÇÃO DE SEGURANÇA (Plataforma vs Gateway)
            // Confere se o usuário tem saldo suficiente (se tem menos, barra; se tem igual ou mais, libera)
            if (valorSaque > saldoAtualUsuario) {
                alert("❌ Saque negado! O valor solicitado (R$ " + valorSaque.toFixed(2) + ") é maior do que o seu saldo disponível (R$ " + saldoAtualUsuario.toFixed(2) + ").");
                return;
            }

            // 3. SE PASSOU NA VALIDAÇÃO, APROVA E PROCESSA
            // Desconta o valor do saldo do usuário
            saldoAtualUsuario -= valorSaque;

            // Salva o novo saldo atualizado no navegador
            localStorage.setItem('mxp_saldo', saldoAtualUsuario.toFixed(2));

            // Simula o aviso ao gateway e o pagamento bem-sucedido para a conta bancária
            alert("✅ Saque de R$ " + valorSaque.toFixed(2) + " aprovado pelo gateway! O Pix foi enviado com sucesso para a chave: " + pix);
            
            // Redireciona de volta para a Home para o usuário ver o saldo atualizado
            window.location.href = "home.html";
        }
    </script>
</body>
</html>
