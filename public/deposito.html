<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depósito</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0b0e14; --card-bg: #161b22; --accent-blue: #007bff; --text-main: #ffffff; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; margin: 0; padding: 0 20px; }

        .header { padding: 20px 0; display: flex; align-items: center; font-weight: bold; font-size: 1.2em; }
        .tab { color: #8b949e; margin-bottom: 20px; border-bottom: 2px solid var(--accent-blue); display: inline-block; padding-bottom: 5px; }

        /* Campo de Input Selecionado */
        .input-group { background: #161b22; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .input-group span { color: #ffffff; font-weight: bold; }
        
        .grid-values { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .value-btn { padding: 15px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; text-align: center; cursor: pointer; color: #fff; }
        .value-btn.selected { border: 1px solid var(--accent-blue); background: #1c2431; color: var(--accent-blue); }
        
        .btn-deposit { width: 100%; padding: 18px; background: var(--accent-blue); border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 1em; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-chevron-left" onclick="history.back()"></i> 
        <span style="margin: 0 auto;">Depósito</span>
    </div>

    <div class="tab">Depósito on-line</div>

    <!-- Campo que mostra o valor escolhido -->
    <div class="input-group">
        <span id="display-valor">R$ 0</span>
        <i class="fa-solid fa-xmark" style="cursor:pointer;" onclick="limparSelecao()"></i>
    </div>

    <div class="grid-values">
        <div class="value-btn" onclick="selecionarValor('15,00')">15,00</div>
        <div class="value-btn" onclick="selecionarValor('35,00')">35,00</div>
        <div class="value-btn" onclick="selecionarValor('60,00')">60,00</div>
        <div class="value-btn" onclick="selecionarValor('130,00')">130,00</div>
        <div class="value-btn" onclick="selecionarValor('200,00')">200,00</div>
        <div class="value-btn" onclick="selecionarValor('500,00')">500,00</div>
        <div class="value-btn" onclick="selecionarValor('1.000,00')">1.000,00</div>
        <div class="value-btn" onclick="selecionarValor('5.000,00')">5.000,00</div>
        <div class="value-btn" onclick="selecionarValor('15.000,00')">15.000,00</div>
    </div>

    <button class="btn-deposit">Depositar Agora</button>

    <script>
        function selecionarValor(valor) {
            // Atualiza o texto superior
            document.getElementById('display-valor').innerText = 'R$ ' + valor;
            
            // Remove a classe 'selected' de todos os botões
            document.querySelectorAll('.value-btn').forEach(btn => btn.classList.remove('selected'));
            
            // Adiciona a classe 'selected' apenas no botão clicado
            event.target.classList.add('selected');
        }

        function limparSelecao() {
            document.getElementById('display-valor').innerText = 'R$ 0';
            document.querySelectorAll('.value-btn').forEach(btn => btn.classList.remove('selected'));
        }
    </script>
</body>
</html>
