<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Pix - MXP$15</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0b0e14; --card-bg: #161b22; --accent-blue: #007bff; --text-main: #ffffff; --text-muted: #8b949e; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }

        .header { padding: 20px 0; display: flex; align-items: center; font-weight: bold; font-size: 1.2em; text-align: left; }
        .box-qr { background: var(--card-bg); border: 1px solid #30363d; padding: 25px; border-radius: 12px; max-width: 400px; margin: 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .valor-destaque { color: #28a745; font-size: 1.8em; font-weight: bold; margin: 10px 0; }
        
        .qr-container { background: #fff; padding: 15px; display: inline-block; border-radius: 8px; margin: 15px 0; }
        .qr-container img { width: 180px; height: 180px; display: block; }

        .copia-cola-box { background: #0b0e14; border: 1px solid #30363d; padding: 10px; border-radius: 6px; font-size: 0.85em; color: var(--text-muted); word-break: break-all; margin: 15px 0; text-align: left; max-height: 60px; overflow-y: auto; }
        
        .btn-acao { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1em; margin-top: 10px; }
        .btn-copiar { background: var(--accent-blue); color: #fff; }
        .btn-voltar { background: transparent; color: var(--text-muted); border: none; margin-top: 15px; cursor: pointer; }

        .status-aviso { color: #e6af2e; font-weight: bold; font-size: 0.9em; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    </style>
</head>
<body>

    <div class="header" style="max-width: 400px; margin: 0 auto;">
        <i class="fa-solid fa-chevron-left" style="cursor:pointer;" onclick="history.back()"></i> 
        <span style="margin: 0 auto;">Pagamento Pix</span>
    </div>

    <div class="box-qr">
        <p style="color: var(--text-muted); margin: 0;">Valor do Depósito</p>
        <div class="valor-destaque" id="textoValor">R$ 0,00</div>
        
        <!-- Onde o QR Code gerado vai aparecer -->
        <div class="qr-container" id="containerQrCode">
            <p style="color: #000; font-size: 0.9em; margin: 70px 0;">Gerando Pix...</p>
        </div>

        <p style="font-size: 0.85em; color: var(--text-muted); margin: 5px 0;">Copie o código Pix Copia e Cola abaixo:</p>
        
        <div class="copia-cola-box" id="textoCopiaCola">
            Aguardando geração do código...
        </div>

        <button class="btn-acao btn-copiar" onclick="copiarCodigoPix()">
            <i class="fa-solid fa-copy"></i> Copiar Código Pix
        </button>

        <div class="status-aviso" id="statusPagamento">
            <i class="fa-solid fa-spinner fa-spin"></i> Aguardando pagamento...
        </div>

        <button class="btn-voltar" onclick="window.location.href='deposito.html'">Cancelar e Voltar</button>
    </div>

    <script>
        // 1. Pega o valor enviado pela página de depósito via URL (ex: qrcode.html?valor=50)
        const urlParams = new URLSearchParams(window.location.search);
        const valorDepositado = parseFloat(urlParams.get('valor')) || 0;

        // Se tentarem acessar direto sem valor, manda de volta pro depósito
        if (valorDepositado <= 0) {
            alert("Nenhum valor informado!");
            window.location.href = "deposito.html";
        }

        // Exibe o valor na tela formatado
        document.getElementById('textoValor').innerText = `R$ ${valorDepositado.toFixed(2).replace('.', ',')}`;

        let chavePixSimuladaCopiaECola = "00020126580014br.gov.bcb.pix...[SUA_CHAVE_PIX_AQUI]..." + valorDepositado;

        // 2. FUNÇÃO QUE SOLICITA O PIX AO SEU GATEWAY
        function gerarPixNoGateway() {
            // AQUI É ONDE VOCÊ FARIA O SEU `fetch` PARA A API DO SEU GATEWAY DE PAGAMENTO (Ex: Mercado Pago, SuitPay, etc.)
            // Exemplo:
            // fetch('https://api.seugateway.com/v1/pix', { method: 'POST', body: JSON.stringify({ amount: valorDepositado }) })
            
            // Simulando a resposta bem-sucedida do Gateway após 1 segundo:
            setTimeout(() => {
                // Insere a imagem real do QR code gerada pelo gateway (ou API pública de teste baseada no valor)
                document.getElementById('containerQrCode').innerHTML = `
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(chavePixSimuladaCopiaECola)}" alt="QR Code Pix">
                `;

                // Exibe o copia e cola
                document.getElementById('textoCopiaCola').innerText = chavePixSimuladaCopiaECola;

                // Inicia o monitoramento automático para saber se o usuário pagou
                iniciarVerificacaoStatusGateway("ID_DA_transacao_123");
            }, 1000);
        }

        // 3. FUNÇÃO DE CÓPIA DO CÓDIGO
        function copiarCodigoPix() {
            navigator.clipboard.writeText(chavePixSimuladaCopiaECola).then(() => {
                alert("Código Pix Copia e Cola copiado com sucesso!");
            }).catch(err => {
                alert("Erro ao copiar código.");
            });
        }

        // 4. VERIFICAÇÃO AUTOMÁTICA SE O GATEWAY RECEBEU O PAGAMENTO (Polling)
        function iniciarVerificacaoStatusGateway(transactionId) {
            const checarPagamento = setInterval(async () => {
                try {
                    // AQUI VOCÊ CONSULTARIA O SEU SERVIDOR / GATEWAY PARA VER SE O STATUS MUDOU PARA PAGO:
                    // const resposta = await fetch(`https://api.seugateway.com/v1/status/${transactionId}`);
                    // const dados = await resposta.json();
                    
                    // --- SIMULAÇÃO DE PAGAMENTO APROVADO ---
                    // (Para testes, mude para 'true' quando quiser simular que o Pix caiu na conta)
                    let pagamentoAprovadoPeloBanco = false; 

                    // *DICA DE TESTE:* Se quiser testar o fluxo completo agora, remova o 'false' e ponha 'true', 
                    // ou crie um botão de teste na tela. Para simulação automática, deixaremos estruturado:
                    
                    if (pagamentoAprovadoPeloBanco) {
                        clearInterval(checarPagamento); // Para de checar
                        
                        document.getElementById('statusPagamento').style.color = "#28a745";
                        document.getElementById('statusPagamento').innerHTML = `<i class="fa-solid fa-check-circle"></i> Pagamento Aprovado!`;

                        // ADICIONA O VALOR AO SALDO DO USUÁRIO NO LOCALSTORAGE
                        let saldoAtual = parseFloat(localStorage.getItem('mxp_saldo')) || 0;
                        let novoSaldo = saldoAtual + valorDepositado;
                        localStorage.setItem('mxp_saldo', novoSaldo.toFixed(2));

                        // REDIRECIONA PARA A HOME PARA ATUALIZAR O TOPO QUE VOCÊ MARCADO DE VERMELHO
                        setTimeout(() => {
                            window.location.href = "home.html";
                        }, 1500);
                    }

                } catch (error) {
                    console.error("Erro ao verificar status do Pix", error);
                }
            }, 4000); // Pergunta ao gateway a cada 4 segundos
        }

        // Executa a geração do Pix logo que a página abre
        window.onload = gerarPixNoGateway;
    </script>
</body>
</html>
