<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promoções</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background-color: #0b111e; color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .scroll-menu-container { display: flex; gap: 5px; justify-content: center; margin-bottom: 20px; overflow-x: auto; }
        .menu-tab { padding: 10px 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #1a1a1a; color: white; }
        .banner { width: 100%; max-width: 350px; border-radius: 15px; margin-bottom: 20px; }
        .grid-bau { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; background-color: #1a1a1a; border-radius: 12px; margin: 10px; }
        .bau-item { position: relative; text-align: center; }
        .bau-texto { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 8px; font-weight: bold; width: 100%; pointer-events: none; text-shadow: 1px 1px 2px #000; }
        .convite-btn { display: block; width: 100%; max-width: 350px; margin: 10px auto; padding: 20px; background-color: #1a1a1a; color: white; border: 1px solid #333; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="scroll-menu-container">
        <button class="menu-tab">Eventos</button>
        <button class="menu-tab">Rebate</button>
        <button class="menu-tab">VIP</button>
        <button class="menu-tab">Histórico</button>
        <button class="menu-tab">Pendente</button>
    </div>

    <img src="IMG-20260707-WA.jpg" class="banner" alt="Promoções">

    <p>Convide amigos e ganhe bônus.</p>

    <div class="grid-bau">
        <div class="bau-item">
            <img src="treasureBoxClose.png" style="width: 100%; object-fit: contain;">
            <div class="bau-texto">Promo 1<br><span style="color: #f6ad55;">R$ 30</span></div>
        </div>
        <div class="bau-item">
            <img src="treasureBoxClose.png" style="width: 100%; object-fit: contain;">
            <div class="bau-texto">Promo 2<br><span style="color: #f6ad55;">R$ 30</span></div>
        </div>
        <div class="bau-item">
            <img src="treasureBoxClose.png" style="width: 100%; object-fit: contain;">
            <div class="bau-texto">Promo 3<br><span style="color: #f6ad55;">R$ 30</span></div>
        </div>
        <div class="bau-item">
            <img src="treasureBoxClose.png" style="width: 100%; object-fit: contain;">
            <div class="bau-texto">Promo 4<br><span style="color: #f6ad55;">R$ 30</span></div>
        </div>
    </div>

    <button class="convite-btn" onclick="window.location.href='convite1.html'">Convide 1 amigo e ganhe R$30</button>
    <button class="convite-btn" onclick="window.location.href='convite10.html'">Convide 10 amigos = R$300</button>
    <button class="convite-btn" onclick="window.location.href='convite100.html'">Convide 100 amigos = R$1000</button>
    <button class="convite-btn" style="background-color: #333;" onclick="window.location.href='index.html'">Voltar</button>

</body>
</html>
