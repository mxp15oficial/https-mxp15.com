</head>
<body>

  <div class="promo-tabs">
    <button class="active">Eventos</button>

    <button>VIP</button>

    <button>Histórico</button>
    <button>pendente</button>

  <div class="promo-container">
    
    <div class="promo-card">
      <img src="public/IMG_20260708_172307.png" alt="Recompensa Recarga">
    </div>

    <div class="promo-card">
    <img src="IMG_20260708_172242.png" alt="Convide Amigo" class="banner">
    </div>

    <div class="promo-card">
      <img src="banner3.jpg" alt="Bonus VIP">
    </div>

    <div class="promo-card">
      <img src="banner4.jpg" alt="Bonus Mensal">

  <nav class="menu-bottom">
    <a href="home.html">🏠 <span>Início</span></a>
    <a href="promocao.html" class="active">🎁 <span>Promoção</span></a>

  <div class="rebate-container">
    <!-- Barra Lateral (Sidebar) -->
    <aside class="rebate-sidebar">
        <button class="nav-item active"><img src="icon-cartas.png"> Cartas</button>
        <button class="nav-item"><img src="icon-slot.png"> Slot</button>
        <button class="nav-item"><img src="icon-pesca.png"> Pesca</button>
        <button class="nav-item"><img src="icon-esportes.png"> Esportes</button>
        <button class="nav-item"><img src="icon-cassino.png"> Cassino</button>
        <button class="btn-receber">Receber</button>
        <button class="btn-historico">Histórico</button>
    </aside>

    <!-- Lista de Reembolso -->
    <main class="rebate-list">
        <div class="rebate-card">
            <div class="card-header">
                <img src="logo-provider.png" class="provider-logo">
                <div class="info">
                    <span>Aposta <b>0,00</b></span>
                    <span>Taxa de reembolso <b>0,00%</b></span>
                </div>
            </div>
            <div class="card-footer">
                <p>Aposte 1,00 para receber 0,50%</p>
                <span>Coletável <b>0,00</b></span>
            </div>
        </div>
        <!-- Repita o .rebate-card para outros provedores -->
    </main>
  </div>
  
  <script src="script.js"></script>
