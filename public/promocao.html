<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promoções</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; background-color: #0a1424; color: white; }
        
        /* Barra de Abas Superior */
        .top-nav {
            display: flex;
            background-color: #0d1b33;
            padding: 10px;
            overflow-x: auto;
            border-bottom: 2px solid #1a3a66;
        }
        .top-nav a {
            color: #8899aa;
            text-decoration: none;
            padding: 0 15px;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .top-nav a.active { color: #ffffff; border-bottom: 2px solid #007bff; }

        /* Container Principal */
        .container { padding: 15px; padding-bottom: 80px; }
        
        /* Cards de Promoção */
        .promo-card {
            background: linear-gradient(to right, #0044cc, #002266);
            border: 1px solid #3366ff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .promo-text h2 { margin: 0; color: #ffcc00; font-size: 1.4rem; }
        .promo-text p { margin: 5px 0 0 0; font-size: 0.9rem; font-weight: bold; }
        .promo-img { width: 80px; height: 80px; background: #003399; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #aaa; text-align: center; }

        /* Barra de Navegação Inferior */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #0d1b33;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #1a3a66;
        }
        .nav-item { font-size: 0.8rem; color: #fff; }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="#" class="active">Eventos</a>
        <a href="#">Rebate</a>
        <a href="#">VIP</a>
        <a href="#">Código de Resgate</a>
        <a href="#">Histórico</a>
    </div>

    <div class="container">
        <div class="promo-card">
            <div class="promo-text">
                <h2>R$ 2777</h2>
                <p>RECOMPENSA DE<br>RECARGA</p>
            </div>
            <div class="promo-img">Imagem</div>
        </div>

        <div class="promo-card">
            <div class="promo-text">
                <h2>R$ 30 BÔNUS</h2>
                <p>CONVIDE UM<br>AMIGO</p>
            </div>
            <div class="promo-img">Imagem</div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item">Início</div>
        <div class="nav-item">Promoção</div>
        <div class="nav-item">Depósito</div>
        <div class="nav-item">Saque</div>
    </div>

</body>
</html>
