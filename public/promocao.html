<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promoções</title>
    <style>
        body { 
            background-color: #0b1e33; 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 0;
        }

        /* Menu Superior */
        .menu-container {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px;
            gap: 10px;
            -webkit-overflow-scrolling: touch;
        }
        .menu-container::-webkit-scrollbar { display: none; }
        .menu-btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; color: white; }
        .btn-blue { background-color: #007bff; }

        /* Banner Atualizado */
        .banner {
            display: block;
            width: calc(80% - 2px); 
            max-width: 320px;       
            margin: 20px auto;      
            height: auto;
            border-radius: 12px;
        }

        /* Botões de Convite */
        .container-botoes { margin-top: 20px; text-align: center; }
        .convite-btn { 
            display: block; 
            width: 80%; 
            margin: 10px auto; 
            padding: 20px; 
            background-color: #1e2a3a; 
            color: white;
            border: 1px solid #333; 
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <button class="menu-btn btn-blue">Eventos</button>
        <button class="menu-btn btn-blue">Rebate</button>
        <button class="menu-btn btn-blue">VIP</button>
        <button class="menu-btn btn-blue">Cód</button>
    </div>

    <!-- Imagem atualizada -->
    <img src="public/IMG_20260708_172307.png" class="banner" alt="Convide Amigo">

    <p style="text-align: center;">Convide amigos e ganhe bônus.</p>

    <div class="container-botoes">
        <button class="convite-btn">Convide 1 pessoa = R$30</button>
        <button class="convite-btn">Convide 10 pessoas = R$300</button>
        <button class="convite-btn">Convide 100 pessoas = R$1000</button>
        <button class="convite-btn">Voltar</button>
    </div>

</body>
</html>
