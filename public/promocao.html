<!DOCTYPE html>

<head>

    <style>

        .top-nav-menu {
            display: flex;
            overflow-x: auto;

            background-color: #161c28;
            padding: 12px 5px;
            gap: 15px;
            border-bottom: 1px solid #1e2636;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        .top-nav-menu::-webkit-scrollbar {
            display: none; /* Oculta a barra de rolagem no celular */
        }
        .nav-item {
            color: #8fa0b4;
            font-family: sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            padding: 5px 10px;
            cursor: pointer;
        }
        .nav-item.active {
            color: #3b82f6; /* Azul destacado para a aba atual */
            border-bottom: 2px solid #3b82f6;
        }
    </style>
</head>
