<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promoções 8143</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; background-color: #0a1424; color: white; }
        
        .container { padding: 15px; padding-bottom: 90px; }
        
        .promo-card {
            background: linear-gradient(135deg, #0044cc, #002266);
            border: 1px solid #3366ff;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .promo-text h2 { margin: 0; color: #ffcc00; font-size: 1.2rem; }
        .promo-text p { margin: 5px 0 0 0; font-size: 0.8rem; font-weight: bold; }
        .promo-img { width: 80px; height: 80px; background: rgba(0,0,0,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #6688aa; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #0d1b33;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #1a3a66;
            cursor: pointer;
        }
        .nav-item { font-size: 0.75rem; color: #fff; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <div class="promo-card">
            <div class="promo-text">
                <h2>R$ 2777</h2>
                <p>RECOMPENSA DE RECARGA</p>
            </div>
            <div class="promo-img">Imagem</div>
        </div>
        <!-- Adicione os outros cards aqui seguindo o mesmo padrão -->
    </div>

    <!-- Barra Inferior conectada ao script.js -->
    <div class="bottom-nav">
        <!-- Chame as funções que estão dentro do seu script.js -->
        <div class="nav-item" onclick="entrar()">Início</div>
        <div class="nav-item" onclick="entrarJogo()">Promoção</div>
        <div class="nav-item" onclick="cadastrar()">Depósito</div>
        <div class="nav-item" onclick="entrar()">Saque</div>
        <div class="nav-item" onclick="entrar()">Perfil</div>
    </div>

    <!-- Conexão com o seu arquivo JS -->
    <script src="script.js"></script>
</body>
</html>
