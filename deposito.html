<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depósito</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="login-box">

        <img src="4085.jpg" width="120">

        <h1>DEPÓSITO PIX</h1>

        <br>

        <div class="vip-box">

            <h2>Bônus de 100%</h2>

            <p>
                Deposite R$20 e receba 23
            </p>

        </div>

        <br>

        <input type="number" placeholder="Digite o valor">

        <br><br>

        <button>
            GERAR PIX
        </button>

        <br><br>

        <p>
            Chave PIX:
        </p>

        <h3>
            mxp15@pix.com
        </h3>

        <br>

        <button onclick="window.location.href='home.html'">
            Voltar
        </button>

    </div>

  <script>
document.querySelector('button, .btn, #btn-depositar').addEventListener('click', async (e) => {
  e.preventDefault();
  
  // Busca o valor digitado ou selecionado na tela (padrão 20 se não achar)
  const valorInput = document.querySelector('input[type="number"], #valor, .valor');
  const valor = valorInput ? valorInput.value : 20;

  alert('Gerando seu PIX... Por favor, aguarde alguns segundos.');

  try {
    const response = await fetch('/api/gerar-pix', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ valor: valor })
    });

    const dados = await response.json();

    if (dados.sucesso) {
      // Abre uma janela simples mostrando o QR Code e o Copia e Cola
      const novaJanela = window.open('', '_blank');
      novaJanela.document.write(`
        <div style="text-align:center; font-family:sans-serif; padding:20px;">
          <h2>Seu PIX foi gerado!</h2>
          <img src="data:image/jpeg;base64,${dados.imagemQrCode}" style="width:250px; height:250px; margin:20px 0;" /><br/>
          <p><strong>Copia e Cola:</strong></p>
          <textarea style="width:100%; max-width:400px; height:80px; text-align:center;" readonly>${dados.copiaECola}</textarea>
          <p style="color:green; font-size:14px;">Após pagar, o saldo entrará na sua conta.</p>
        </div>
      `);
    } else {
      alert('Erro do Gateway: ' + (dados.error || 'Não foi possível gerar o Pix.'));
    }
  } catch (err) {
    alert('Erro ao conectar com o servidor de pagamentos.');
  }
});
  </script>
    
</body>

</html>
